name: Feature request
description: Propose a focused, read-only improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        FixMate AI does not perform autonomous repair. Proposals must preserve privacy, deterministic evidence, and read-only defaults.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and safety considerations
      description: Explain data, permissions, external services, and failure behavior.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This request does not require automatic repair, arbitrary shell/SQL/filesystem access, packet capture, port scanning, or secret collection.
          required: true
