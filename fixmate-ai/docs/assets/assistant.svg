<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">FixMate AI synthetic troubleshooting assistant</title><desc id="desc">Vector mockup of a deterministic evidence-based chat response.</desc>
  <rect width="1200" height="675" fill="#0b1d33"/><rect x="28" y="24" width="1144" height="627" rx="22" fill="#f7f9fc"/><rect x="28" y="24" width="1144" height="76" rx="22" fill="#153a64"/><rect x="28" y="78" width="1144" height="22" fill="#153a64"/><text x="62" y="70" font-family="Arial" font-size="29" font-weight="700" fill="white">Troubleshooting Assistant</text><rect x="922" y="46" width="212" height="32" rx="16" fill="#1f8a70"/><text x="1028" y="67" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="white">SYNTHETIC DEMO</text>
  <g font-family="Arial"><rect x="58" y="126" width="714" height="480" rx="16" fill="white" stroke="#d8e1ec"/><text x="82" y="162" font-size="19" font-weight="700" fill="#153a64">Conversation · Deterministic mode</text><rect x="286" y="192" width="446" height="72" rx="20" fill="#eaf3ff"/><text x="312" y="224" font-size="16" fill="#26374d">Why is my computer slow?</text><text x="312" y="247" font-size="12" fill="#607086">Question treated as untrusted input</text><rect x="88" y="292" width="612" height="194" rx="20" fill="#eef8f5"/><text x="114" y="328" font-size="17" font-weight="700" fill="#14705b">Direct answer</text><text x="114" y="361" font-size="15" fill="#26374d">The latest scan does not show sustained high CPU or memory.</text><text x="114" y="386" font-size="15" fill="#26374d">Disk free space is low and may affect performance.</text><text x="114" y="424" font-size="14" font-weight="700" fill="#526173">Guidance, not a guaranteed fix:</text><text x="114" y="449" font-size="14" fill="#526173">Review large files and rerun a scan while the slowdown occurs.</text><rect x="88" y="515" width="612" height="62" rx="12" fill="#f4f7fa"/><text x="112" y="541" font-size="13" fill="#526173">No repair was executed · No data was sent externally</text><text x="112" y="562" font-size="13" fill="#526173">Freshness: 0.4 hours · Severity: medium</text>
  <rect x="798" y="126" width="346" height="480" rx="16" fill="white" stroke="#d8e1ec"/><text x="822" y="162" font-size="19" font-weight="700" fill="#153a64">Evidence panel</text><rect x="822" y="190" width="298" height="78" rx="10" fill="#f4f7fa"/><text x="840" y="219" font-size="13" fill="#607086">CPU usage</text><text x="840" y="247" font-size="23" font-weight="700" fill="#26374d">42%</text><rect x="822" y="284" width="298" height="78" rx="10" fill="#f4f7fa"/><text x="840" y="313" font-size="13" fill="#607086">Memory usage</text><text x="840" y="341" font-size="23" font-weight="700" fill="#26374d">68%</text><rect x="822" y="378" width="298" height="94" rx="10" fill="#fff4df"/><text x="840" y="407" font-size="13" fill="#8c5900">Disk free</text><text x="840" y="438" font-size="23" font-weight="700" fill="#9a5b00">8%</text><text x="840" y="458" font-size="12" fill="#8c5900">Below configured threshold</text><text x="822" y="518" font-size="14" font-weight="700" fill="#153a64">Source of truth</text><text x="822" y="544" font-size="13" fill="#526173">Latest local SQLite scan</text><text x="822" y="565" font-size="13" fill="#526173">Timestamp included in answer</text></g>
</svg>
