  <rect x="335" y="132" width="245" height="170" rx="16" fill="white" stroke="#dce4ee"/><text x="359" y="167" font-size="17" fill="#526173">CPU usage</text><text x="359" y="226" font-size="46" font-weight="700" fill="#153a64">42%</text><rect x="359" y="250" width="190" height="12" rx="6" fill="#dce4ee"/><rect x="359" y="250" width="80" height="12" rx="6" fill="#3287d4"/>
  <rect x="605" y="132" width="245" height="170" rx="16" fill="white" stroke="#dce4ee"/><text x="629" y="167" font-size="17" fill="#526173">Memory usage</text><text x="629" y="226" font-size="46" font-weight="700" fill="#153a64">68%</text><rect x="629" y="250" width="190" height="12" rx="6" fill="#dce4ee"/><rect x="629" y="250" width="129" height="12" rx="6" fill="#7b61c9"/>
  <rect x="875" y="132" width="245" height="170" rx="16" fill="white" stroke="#dce4ee"/><text x="899" y="167" font-size="17" fill="#526173">Disk free</text><text x="899" y="226" font-size="46" font-weight="700" fill="#b36b00">8%</text><rect x="899" y="250" width="190" height="12" rx="6" fill="#dce4ee"/><rect x="899" y="250" width="16" height="12" rx="6" fill="#e19a27"/>
