<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">FixMate AI synthetic system health dashboard</title>
  <desc id="desc">A privacy-safe vector mockup showing health score and system metrics.</desc>
