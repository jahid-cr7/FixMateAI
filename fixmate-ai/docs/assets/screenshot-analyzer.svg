  <text x="62" y="71" font-family="Arial" font-size="29" font-weight="700" fill="white">Error Screenshot Analyzer</text><rect x="925" y="46" width="210" height="32" rx="16" fill="#1f8a70"/><text x="1030" y="67" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="white">SYNTHETIC DEMO</text>
  <g font-family="Arial"><rect x="56" y="126" width="500" height="286" rx="16" fill="white" stroke="#d8e1ec"/><text x="80" y="162" font-size="19" font-weight="700" fill="#153a64">Original image preview</text><rect x="82" y="184" width="448" height="196" rx="10" fill="#eaf0f6"/><rect x="128" y="224" width="356" height="108" rx="8" fill="white" stroke="#8091a7"/><circle cx="160" cy="257" r="15" fill="#d9534f"/><text x="160" y="263" text-anchor="middle" font-size="18" font-weight="700" fill="white">!</text><text x="190" y="258" font-size="18" font-weight="700" fill="#26374d">Permission denied</text><text x="190" y="288" font-size="14" fill="#526173">Cannot open the synthetic demo document.</text><rect x="392" y="302" width="68" height="22" rx="5" fill="#3287d4"/><text x="426" y="318" text-anchor="middle" font-size="12" fill="white">OK</text>
  <rect x="582" y="126" width="562" height="286" rx="16" fill="white" stroke="#d8e1ec"/><text x="606" y="162" font-size="19" font-weight="700" fill="#153a64">Processed image</text><rect x="608" y="184" width="510" height="196" rx="10" fill="#242b34"/><rect x="662" y="227" width="400" height="100" fill="white"/><text x="690" y="266" font-size="21" font-weight="700" fill="#111">PERMISSION DENIED</text><text x="690" y="300" font-size="16" fill="#111">CANNOT OPEN SYNTHETIC DEMO DOCUMENT</text>
  <rect x="56" y="438" width="500" height="168" rx="16" fill="white" stroke="#d8e1ec"/><text x="80" y="472" font-size="18" font-weight="700" fill="#153a64">Editable local OCR text</text><rect x="80" y="490" width="452" height="88" rx="8" fill="#f4f7fa" stroke="#c6d2df"/><text x="98" y="524" font-size="15" fill="#26374d">Permission denied while opening a</text><text x="98" y="549" font-size="15" fill="#26374d">synthetic demo document.</text>
