<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">FixMate AI synthetic screenshot analyzer</title><desc id="desc">Vector mockup of local OCR preprocessing and deterministic error matching.</desc>
